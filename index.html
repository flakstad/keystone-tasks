<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Todo List Demo</title>
<style>
  body { font-family: sans-serif; margin: 2rem; background: #333; color: #eee; }
  ul { list-style: none; padding: 0; }
  li { padding: 0.5rem; border: 1px solid #ccc; margin-bottom: 0.25rem; cursor: pointer; }
  li.completed { text-decoration: line-through; color: #888; }
  ul ul { margin-left: 1.5rem; padding-left: 0.5rem; border-left: 1px dotted #ccc; }
  #new-todo { padding: 0.5rem; width: 200px; margin-bottom: 1rem; display:block; }
  #key-bindings { margin-top: 1rem; font-size: 0.9rem; color: #eee; }
  li.has-children {
      position: relative;
      padding-left: 1.2em;
  }

  li.has-children::before {
      content: "▼"; /* expanded by default */
      position: absolute;
      left: 0;
      top: 0.1em;
      cursor: pointer;
  }

  li.collapsed::before {
      content: "▶"; /* collapsed */
  }

</style>
</head>
<body>
<h1>Todo List</h1>
<input id="new-todo" type="text" placeholder="Add a todo and press Enter">

<ul id="todo-list">
  <li data-id="1" tabindex="0">Buy milk</li>
  <li data-id="2" tabindex="0">Read book</li>
  <li data-id="3" tabindex="0">Make food</li>
  <li data-id="4" tabindex="0">Tidy living room</li>
  <li data-id="5" tabindex="0">Run around</li>
</ul>

<div id="key-bindings">
  <strong>Key Bindings:</strong><br>
  Enter / Space → toggle complete<br>
  Alt + ↑ / ↓ → move item<br>
  Alt + → / ← → indent / outdent<br>
  Alt + H → collapse, Alt + L → expand
</div>

<script src="todo-list.js"></script>
<script>
  const listEl = document.getElementById("todo-list");
  const todos = new TodoList(listEl);

  document.getElementById("new-todo").addEventListener("keydown", e => {
    if(e.key === "Enter" && e.target.value.trim()) {
      todos.addItem(e.target.value.trim());
      e.target.value = "";
    }
  });

  // Example: log events
  ["todo:add","todo:toggle","todo:move","todo:indent","todo:outdent","todo:collapse","todo:expand"]
    .forEach(evt => listEl.addEventListener(evt, e => console.log(evt, e.detail)));
</script>
</body>
</html>
